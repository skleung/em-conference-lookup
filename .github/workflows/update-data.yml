name: Update attendance data

on:
  schedule:
    - cron: '0 6 * * 3'   # Wednesdays at 6am UTC (after typical Tuesday sheet updates)
  workflow_dispatch:        # allow manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit data/attendance.json back to the repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Fetch Smartsheet and generate attendance.json
        run: python scripts/fetch_smartsheet.py
        env:
          SMARTSHEET_API_KEY: ${{ secrets.SMARTSHEET_API_KEY }}
          SMARTSHEET_SHEET_ID: ${{ secrets.SMARTSHEET_SHEET_ID }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/attendance.json
          git diff --cached --quiet || git commit -m "chore: update attendance data [skip ci]"
          git push
