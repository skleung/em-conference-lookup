name: Update attendance data

# Priority order:
# 1. Playwright scraper (default — no credentials needed)
# 2. Smartsheet API (if SMARTSHEET_API_KEY + SMARTSHEET_SHEET_ID secrets are set)
# 3. Committed XLSX at data/source.xlsx (manual fallback)

on:
  schedule:
    - cron: '0 6 * * 3'   # Wednesdays at 6am UTC
  workflow_dispatch:        # manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install playwright openpyxl requests

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Generate attendance.json
        run: |
          if [ -n "$SMARTSHEET_API_KEY" ] && [ -n "$SMARTSHEET_SHEET_ID" ]; then
            echo "Mode: Smartsheet API"
            python scripts/fetch_smartsheet.py
          elif [ -f data/source.xlsx ]; then
            echo "Mode: committed XLSX (data/source.xlsx)"
            python scripts/fetch_smartsheet.py --from-xlsx --xlsx-path data/source.xlsx
          else
            echo "Mode: Playwright scraper (headless browser)"
            python scripts/scrape_smartsheet.py
          fi
        env:
          SMARTSHEET_API_KEY: ${{ secrets.SMARTSHEET_API_KEY }}
          SMARTSHEET_SHEET_ID: ${{ secrets.SMARTSHEET_SHEET_ID }}

      - name: Validate generated data
        run: python scripts/validate_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/attendance.json
          git diff --cached --quiet || git commit -m "chore: update attendance data [skip ci]"
          git push
